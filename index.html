<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ops Companion — SmartHospitality.ai</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#F4F2EE;--bg2:#ECEAE4;--bg3:#E4E1DA;
--surface:#FFFFFF;
--text:#2C2C2A;--text2:#5A5754;--text3:#8C8880;
--accent:#4A6741;--accent2:#3A5332;--at:#FFFFFF;
--gold:#C9A84C;--border:rgba(44,44,42,0.12);--border2:rgba(44,44,42,0.22);
--r:12px;--rs:8px;
--ibb:#E4E1DA;--ibc:#2C2C2A;--ibbo:rgba(44,44,42,0.25);
}
.night{
--bg:#1C1C1A;--bg2:#252521;--bg3:#2E2E2A;
--surface:#252521;
--text:#F5F0E8;--text2:#A09C8C;--text3:#6B6760;
--accent:#C9A84C;--accent2:#B8943C;--at:#1C1C1A;
--border:rgba(245,240,232,0.08);--border2:rgba(245,240,232,0.15);
--ibb:#2E2E2A;--ibc:#F5F0E8;--ibbo:rgba(245,240,232,0.18);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hidden{display:none!important}
button,input,select,textarea{font-family:inherit}

#auth{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--bg)}
.acard{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--r);padding:44px 40px;width:100%;max-width:380px}
.abrand{display:flex;align-items:center;gap:12px;margin-bottom:36px}
.aicon{width:44px;height:44px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center}
.aicon i{color:#fff;font-size:20px}
.aname{font-size:18px;font-weight:500}
.asub{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.fl{margin-bottom:20px}
.fl label{display:block;font-size:11px;color:var(--text2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.fl input{width:100%;padding:11px 14px;border:0.5px solid var(--border2);border-radius:var(--rs);font-size:14px;background:var(--bg2);color:var(--text);outline:none}
.fl input:focus{border-color:var(--accent)}
.fl input::placeholder{color:var(--text3)}
.bmain{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:13.5px;font-weight:500;cursor:pointer}
.bmain:hover{background:var(--accent2)}
.night .bmain{background:var(--gold);color:#1C1C1A}
.dhint{font-size:11.5px;color:var(--text3);margin-top:20px;text-align:center;line-height:1.8}
.dhint strong{color:var(--text2)}
.err{font-size:12px;color:#A32D2D;margin-top:8px;text-align:center}

#app{display:none;flex-direction:column;height:100vh;background:var(--bg)}
.tb{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0}
.tbl{display:flex;align-items:center;gap:12px}
.ticon{width:32px;height:32px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center}
.ticon i{color:#fff;font-size:15px}
.tname{font-size:14px;font-weight:500}
.tout{font-size:10.5px;color:var(--text3);margin-top:1px}
.tbr{display:flex;align-items:center;gap:8px}
.rpill{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.rpill.admin{background:#FAECE7;color:#712B13}
.rpill.manager{background:#FAEEDA;color:#633806}
.rpill.staff{background:#E4EBE2;color:#3A5332;border:0.5px solid #4A6741}
.night .rpill.staff{background:#2E2E2A;color:var(--gold);border:0.5px solid var(--gold)}
.ibtn{width:36px;height:36px;border-radius:var(--rs);border:0.5px solid var(--ibbo);background:var(--ibb);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ibc)}
.ibtn:hover{background:var(--bg3)}
.ibtn i{font-size:16px}

.nav{display:flex;border-bottom:0.5px solid var(--border);background:var(--surface);flex-shrink:0;overflow-x:auto}
.nav::-webkit-scrollbar{display:none}
.nb{padding:11px 16px;font-size:12px;color:var(--text2);border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:5px}
.nb i{font-size:14px}
.nb.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.night .nb.active{color:var(--gold);border-bottom-color:var(--gold)}
.nb:hover:not(.active){color:var(--text)}

.pls{flex:1;overflow-y:auto;position:relative}
.pls::-webkit-scrollbar{width:4px}
.pls::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.pl{padding:20px;display:none;flex-direction:column;gap:14px}
.pl.active{display:flex}

.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:18px 20px}
.ctitle{font-size:11px;font-weight:500;margin-bottom:14px;display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.06em;color:var(--text2)}
.ctitle i{font-size:16px;color:var(--accent)}
.night .ctitle i{color:var(--gold)}

.qpr{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.qp{font-size:11.5px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer}
.qp:hover{border-color:var(--accent);color:var(--accent)}
.night .qp:hover{border-color:var(--gold);color:var(--gold)}

.msgs{display:flex;flex-direction:column;gap:12px;min-height:200px;max-height:280px;overflow-y:auto;margin-bottom:12px}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.msg{display:flex;gap:8px;align-items:flex-start;max-width:90%;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.u{align-self:flex-end;flex-direction:row-reverse}
.av{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.av.ai{background:var(--accent);color:#fff}
.night .av.ai{background:var(--gold);color:#1C1C1A}
.av.me{background:var(--bg3);color:var(--text2);border:0.5px solid var(--border2)}
.bub{padding:9px 13px;border-radius:10px;font-size:13px;line-height:1.65}
.bub.ai{background:var(--bg2);border:0.5px solid var(--border);border-top-left-radius:3px}
.bub.u{background:var(--accent);color:#fff;border-top-right-radius:3px}
.night .bub.u{background:var(--gold);color:#1C1C1A}
.bub ul{margin:5px 0 0 14px;display:flex;flex-direction:column;gap:3px}
.bub p{margin-bottom:3px}
.tdots{display:flex;gap:4px;align-items:center;padding:10px 13px}
.tdots span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:td 1.2s ease-in-out infinite}
.night .tdots span{background:var(--gold)}
.tdots span:nth-child(2){animation-delay:.2s}
.tdots span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.inrow{display:flex;gap:8px}
.inrow textarea{flex:1;border:0.5px solid var(--border2);border-radius:10px;padding:10px 13px;font-size:13px;resize:none;background:var(--bg2);color:var(--text);outline:none;min-height:42px;max-height:100px;line-height:1.5}
.inrow textarea:focus{border-color:var(--accent)}
.inrow textarea::placeholder{color:var(--text3)}
.sbtn{width:42px;height:42px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sbtn:hover{background:var(--accent2)}
.sbtn:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed}
.sbtn i{font-size:18px}
.night .sbtn{background:var(--gold);color:#1C1C1A}

.bsm{font-size:12px;padding:8px 16px;border-radius:7px;border:none;background:var(--accent);color:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.bsm:hover{background:var(--accent2)}
.night .bsm{background:var(--gold);color:#1C1C1A}
.bout{font-size:12px;padding:8px 16px;border-radius:7px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.bout:hover{border-color:var(--accent);color:var(--accent)}
.night .bout:hover{border-color:var(--gold);color:var(--gold)}
.bshare{font-size:12px;padding:8px 16px;border-radius:7px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.bshare:hover{border-color:#185FA5;color:#185FA5}

.uz{border:1px dashed var(--border2);border-radius:var(--rs);padding:18px;text-align:center;cursor:pointer;margin-bottom:12px}
.uz:hover{border-color:var(--accent);background:var(--bg2)}
.uz input{display:none}
.uz i{font-size:24px;color:var(--text3);display:block;margin-bottom:6px}
.uz p{font-size:12.5px;color:var(--text2)}

.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.pc{border-radius:var(--rs);overflow:hidden;border:0.5px solid var(--border);cursor:pointer}
.pc:hover{border-color:var(--accent)}
.pc img{width:100%;height:85px;object-fit:cover;display:block;background:var(--bg2)}
.plb{font-size:11px;padding:5px 7px;color:var(--text2);background:var(--surface)}

.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.mc{background:var(--bg2);border-radius:var(--rs);padding:14px;border:0.5px solid var(--border)}
.ml{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.mv{font-size:24px;font-weight:500}

.alist{display:flex;flex-direction:column;gap:8px}
.aitem{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);border-radius:var(--rs);border:0.5px solid var(--border);flex-wrap:wrap;gap:8px}
.ainame{font-size:13px;font-weight:500}
.aisub{font-size:11.5px;color:var(--text3);margin-top:2px}

.qitem{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rs);padding:14px;margin-bottom:10px}
.qtext{font-size:13px;font-weight:500;margin-bottom:10px}
.qopts{display:flex;flex-direction:column;gap:6px}
.qopt{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text2);cursor:pointer}
.qopt.cor{color:var(--accent);font-weight:500}
.night .qopt.cor{color:var(--gold)}

.tblx{width:100%;font-size:12.5px;border-collapse:collapse}
.tblx th{text-align:left;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:7px 10px;border-bottom:0.5px solid var(--border)}
.tblx td{padding:9px 10px;border-bottom:0.5px solid var(--border)}
.tblx tr:last-child td{border-bottom:none}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px}
.dot.active{background:#4A6741}
.night .dot.active{background:var(--gold)}
.dot.inactive{background:var(--border2)}
.ta{font-size:11.5px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:500}
.night .ta{color:var(--gold)}

.step-row{display:flex;flex-direction:column;gap:10px}
.step-item{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;background:var(--bg2);border-radius:var(--rs);border:0.5px solid var(--border)}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px}
.night .step-num{background:var(--gold);color:#1C1C1A}
.step-title{font-size:13px;font-weight:500;margin-bottom:3px}
.step-desc{font-size:12px;color:var(--text2);line-height:1.6}
.step-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:#E4EBE2;color:#3A5332;margin-left:8px;font-weight:500}
.night .step-badge{background:#2E2E2A;color:var(--gold)}

.insight-row{display:flex;flex-direction:column;gap:8px}
.insight-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg2);border-radius:var(--rs);border:0.5px solid var(--border)}
.insight-bar-wrap{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.insight-bar{height:100%;background:var(--accent);border-radius:3px}
.night .insight-bar{background:var(--gold)}
.insight-label{font-size:12.5px;color:var(--text);min-width:130px}
.insight-count{font-size:12px;color:var(--text3);min-width:28px;text-align:right}

.alert-box{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;background:#FAEEDA;border-radius:var(--rs);border:0.5px solid #EF9F27;margin-bottom:14px}
.night .alert-box{background:#2E2A20;border-color:#633806}
.alert-box i{font-size:16px;color:#854F0B;flex-shrink:0;margin-top:1px}
.night .alert-box i{color:#FAC775}
.alert-text{font-size:12.5px;color:#633806;line-height:1.6}
.night .alert-text{color:#FAC775}

.period-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.prbtn{font-size:11.5px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer}
.prbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.night .prbtn.active{background:var(--gold);color:#1C1C1A;border-color:var(--gold)}

.score-ring{width:44px;height:44px;border-radius:50%;border:2.5px solid var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:500;color:var(--accent)}
.night .score-ring{border-color:var(--gold);color:var(--gold)}

.modal-bg{min-height:500px;background:rgba(0,0,0,.48);display:flex;align-items:center;justify-content:center;padding:20px;border-radius:var(--r)}
.modal{background:var(--surface);border-radius:var(--r);padding:22px;max-width:340px;width:100%;border:0.5px solid var(--border)}
.modal img{width:100%;border-radius:var(--rs);margin-bottom:12px;object-fit:cover;height:180px}
.modal-title{font-size:14px;font-weight:500;margin-bottom:5px}
.modal-desc{font-size:12px;color:var(--text2);line-height:1.6}
.mclose{margin-top:14px;font-size:12px;padding:7px 18px;border-radius:7px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer}
</style>
</head>

<script>

UPSELLS: Risotto to Barolo or white Burgundy, offer truffle supplement. Wagyu to Chateau Pichon Baron or Negroni, suggest truffle fries. Salmon to Chablis or Sauvignon Blanc. Caesar to add grilled chicken or Pinot Grigio.

];

function toggleNight(){
  night=!night;
  document.body.classList.toggle('night',night);
  document.getElementById('mi').className=night?'ti ti-sun':'ti ti-moon';
}

function login(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value.trim();
  const user=USERS.find(x=>x.u===u&&x.p===p);
  document.getElementById('lerr').classList.toggle('hidden',!!user);
  if(!user)return;
  cu={...user};
  document.getElementById('auth').style.display='none';
  const a=document.getElementById('app');
  a.style.display='flex';a.style.flexDirection='column';
  const rp=document.getElementById('rp');
  rp.textContent=cu.role.charAt(0).toUpperCase()+cu.role.slice(1);
  rp.className='rpill '+cu.role;
  document.getElementById('outl').textContent='Gallada — Peninsula Istanbul';
  buildApp();
}

function logout(){
  cu=null;chat=[];
  document.getElementById('app').style.display='none';
  document.getElementById('auth').style.display='flex';
}

function buildApp(){
  const r=cu.role;
  const tabs=r==='admin'
    ?[{id:'users',icon:'ti-users',label:'Users'},{id:'metrics',icon:'ti-chart-bar',label:'Overview'}]
    :r==='manager'
    ?[{id:'chat',icon:'ti-message-circle',label:'Assistant'},{id:'insights',icon:'ti-trending-up',label:'Insights'},{id:'onboard',icon:'ti-route',label:'Onboarding'},{id:'appraisal',icon:'ti-award',label:'Appraisals'},{id:'knowledge',icon:'ti-database',label:'Knowledge'},{id:'photos',icon:'ti-photo',label:'Photos'},{id:'quizzes',icon:'ti-school',label:'Quizzes'},{id:'staff',icon:'ti-users',label:'Staff'}]
    :[{id:'chat',icon:'ti-message-circle',label:'Ask AI'},{id:'onboard',icon:'ti-route',label:'My Training'},{id:'photos',icon:'ti-photo',label:'Photos'},{id:'quizzes',icon:'ti-school',label:'My Quizzes'}];
  const nav=document.getElementById('nav');
  const pls=document.getElementById('pls');
  nav.innerHTML='';pls.innerHTML='';
  tabs.forEach((t,i)=>{
    const b=document.createElement('button');
    b.className='nb'+(i===0?' active':'');
    b.dataset.tab=t.id;
    b.innerHTML=`<i class="ti ${t.icon}"></i>${t.label}`;
    b.onclick=()=>sw(t.id);
    nav.appendChild(b);
    const p=document.createElement('div');
    p.className='pl'+(i===0?' active':'');
    p.id='p-'+t.id;
    pls.appendChild(p);
    rp2(t.id);
  });
  if(cu.role!=='admin') initGreet();
}

function sw(id){
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  document.querySelectorAll('.pl').forEach(p=>p.classList.toggle('active',p.id==='p-'+id));
}

function rp2(id){
  const el=document.getElementById('p-'+id);if(!el)return;
  const r=cu.role;
  if(id==='chat')el.innerHTML=bChat(r);
  else if(id==='insights')el.innerHTML=bInsights();
  else if(id==='onboard')el.innerHTML=bOnboard(r);
  else if(id==='appraisal')el.innerHTML=bAppraisal();
  else if(id==='knowledge')el.innerHTML=bKnowledge();
  else if(id==='photos')el.innerHTML=bPhotos(r);
  else if(id==='quizzes')el.innerHTML=bQuizzes(r);
  else if(id==='staff'||id==='users')el.innerHTML=bUsers(r);
  else if(id==='metrics')el.innerHTML=bMetrics();
}

function fmt(t){
  let h=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>');
  const lines=h.split('\n');let out='';let ul=false;
  for(const l of lines){const s=l.trim();
    if(s.startsWith('- ')||s.startsWith('• ')){if(!ul){out+='<ul>';ul=true;}out+=`<li>${s.slice(2)}</li>`;}
    else if(/^\d+\.\s/.test(s)){if(!ul){out+='<ul>';ul=true;}out+=`<li>${s.replace(/^\d+\.\s/,'')}</li>`;}
    else{if(ul){out+='</ul>';ul=false;}if(s)out+=`<p>${s}</p>`;}
  }if(ul)out+='</ul>';return out;
}

  loading=true;document.getElementById('sb').disabled=true;
  inp.value='';inp.style.height='auto';
  addUmsg(text);chat.push({role:'user',content:text});
  showT();
  const lang=LANGS[cu.lang]||'English';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:SYS+'\n\nRespond in '+lang+'. Be concise and practical.',messages:chat})
    });
    const data=await res.json();hideT();
    if(data.content&&data.content[0]){
      const reply=data.content[0].text;
      chat.push({role:'assistant',content:reply});addAImsg(fmt(reply));
    } else addAImsg('Something went wrong. Please try again.');
  }catch(e){hideT();addAImsg('Connection error. Please try again.');}
  loading=false;document.getElementById('sb').disabled=false;
  document.getElementById('ci')?.focus();
}

function addFile(k,inp){
  Array.from(inp.files).forEach(f=>{if(!files[k])files[k]=[];files[k].push(f.name);});
  const el=document.getElementById('fl-'+k);
  if(el)el.innerHTML=files[k].map((f,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 11px;background:var(--bg2);border-radius:7px;border:0.5px solid var(--border);font-size:12.5px;margin-bottom:6px"><i class="ti ti-file" style="color:var(--accent);font-size:15px"></i><span style="flex:1;color:var(--text2)">${f}</span></div>`).join('');
}

function addPhoto(inp){
  Array.from(inp.files).forEach(f=>{
    PHOTOS.push({name:f.name.replace(/\.[^.]+$/,''),desc:'Uploaded presentation photo.',img:URL.createObjectURL(f)});
  });
  rp2('photos');
}

function openPhoto(i){
  const p=PHOTOS[i];
  const pls=document.getElementById('pls');
  const old=document.getElementById('phMod');if(old)old.remove();
  const m=document.createElement('div');m.id='phMod';m.style.cssText='position:absolute;top:0;left:0;right:0;bottom:0;z-index:99';
  m.innerHTML=`<div class="modal-bg" onclick="if(event.target===this.parentElement||event.target.classList.contains('modal-bg'))closeM('phMod')">
    <div class="modal">
      <img src="${p.img}" alt="${p.name}"/>
      <div class="modal-title">${p.name}</div>
      <div class="modal-desc">${p.desc}</div>
      <button class="mclose" onclick="closeM('phMod')">Close</button>
    </div>
  </div>`;
  pls.style.position='relative';pls.appendChild(m);
}

function closeM(id){const e=document.getElementById(id);if(e)e.remove();}

function submitQ(qid){
  const quiz=QUIZZES.find(q=>q.id===qid);if(!quiz)return;
  let score=0;
  quiz.questions.forEach((qq,qi)=>{const sel=document.querySelector(`input[name="q${qid}-${qi}"]:checked`);if(sel&&parseInt(sel.value)===qq.c)score++;});
  if(!qr[cu.u])qr[cu.u]={};
  qr[cu.u][qid]={score,total:quiz.questions.length};
  alert('Quiz submitted. You scored '+score+' out of '+quiz.questions.length+'.');
  rp2('quizzes');
}

function togSt(i){stf[i].status=stf[i].status==='active'?'inactive':'active';rp2('staff');}

function addU(){
  const n=document.getElementById('nN').value.trim();
  const u=document.getElementById('nU').value.trim();
  const p=document.getElementById('nP').value.trim();
  const l=document.getElementById('nL').value;
  if(!n||!u||!p){alert('Please fill all fields.');return;}
  stf.push({u,name:n,role:'staff',status:'active',lang:l,quiz:0,asked:0,lastActive:'New'});
  USERS.push({u,p,role:'staff',name:n,lang:l});
  rp2('staff');
}
</script>
