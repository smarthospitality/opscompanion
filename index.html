<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ops Companion — SmartHospitality.ai</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F2EE;--bg2:#ECEAE4;--bg3:#E4E1DA;
  --surface:#FFFFFF;--surface2:#F4F2EE;
  --text:#2C2C2A;--text2:#5A5754;--text3:#8C8880;
  --accent:#4A6741;--accent2:#3A5332;--accent-text:#FFFFFF;
  --gold:#C9A84C;--border:rgba(44,44,42,0.12);--border2:rgba(44,44,42,0.22);
  --radius:12px;--radius-sm:8px;
  --icon-btn-bg:#E4E1DA;--icon-btn-color:#2C2C2A;--icon-btn-border:rgba(44,44,42,0.25);
}
.night{
  --bg:#1C1C1A;--bg2:#252521;--bg3:#2E2E2A;
  --surface:#252521;--surface2:#2E2E2A;
  --text:#F5F0E8;--text2:#A09C8C;--text3:#6B6760;
  --accent:#C9A84C;--accent2:#B8943C;--accent-text:#1C1C1A;
  --gold:#C9A84C;--border:rgba(245,240,232,0.08);--border2:rgba(245,240,232,0.15);
  --icon-btn-bg:#2E2E2A;--icon-btn-color:#F5F0E8;--icon-btn-border:rgba(245,240,232,0.18);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;min-height:100vh}
.hidden{display:none!important}
button,input,select,textarea{font-family:inherit}

#authScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--bg)}
.auth-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);padding:44px 40px;width:100%;max-width:380px}
.auth-brand{display:flex;align-items:center;gap:12px;margin-bottom:36px}
.brand-icon{width:44px;height:44px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon i{color:#FFFFFF;font-size:20px}
.brand-name{font-size:18px;font-weight:500;color:var(--text)}
.brand-sub{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.field{margin-bottom:20px}
.field label{display:block;font-size:11px;color:var(--text2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.field input{width:100%;padding:11px 14px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;background:var(--bg2);color:var(--text);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--text3)}

/* SIGN IN BUTTON — always fully visible */
.btn-main{
  width:100%;padding:12px;
  background:var(--accent);
  color:#FFFFFF;
  border:none;border-radius:var(--radius-sm);
  font-size:13.5px;font-weight:500;cursor:pointer;
  letter-spacing:.02em;transition:background .15s;
}
.btn-main:hover{background:var(--accent2)}
.night .btn-main{background:var(--gold);color:#1C1C1A}
.night .btn-main:hover{background:#B8943C}

.demo-hint{font-size:11.5px;color:var(--text3);margin-top:20px;text-align:center;line-height:1.8}
.demo-hint strong{color:var(--text2)}
.err{font-size:12px;color:#A32D2D;margin-top:8px;text-align:center}

#appShell{display:none;flex-direction:column;height:100vh;background:var(--bg)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.top-icon{width:32px;height:32px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.top-icon i{color:#FFFFFF;font-size:15px}
.top-name{font-size:14px;font-weight:500;color:var(--text)}
.top-outlet{font-size:10.5px;color:var(--text3);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.role-pill{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.role-pill.admin{background:#FAECE7;color:#712B13}
.role-pill.manager{background:#FAEEDA;color:#633806}
.role-pill.staff{background:#E4EBE2;color:#3A5332;border:0.5px solid #4A6741}
.night .role-pill.staff{background:#2E2E2A;color:var(--gold);border:0.5px solid var(--gold)}

/* ICON BUTTONS (toggle + logout) — always clearly visible */
.icon-btn{
  width:36px;height:36px;
  border-radius:var(--radius-sm);
  border:0.5px solid var(--icon-btn-border);
  background:var(--icon-btn-bg);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--icon-btn-color);
  transition:all .15s;
}
.icon-btn:hover{background:var(--bg3);border-color:var(--border2)}
.icon-btn i{font-size:16px}

.nav{display:flex;border-bottom:0.5px solid var(--border);background:var(--surface);flex-shrink:0;overflow-x:auto}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:11px 18px;font-size:12.5px;color:var(--text2);border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:6px;transition:color .15s;letter-spacing:.01em}
.nav-btn i{font-size:15px}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.night .nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.nav-btn:hover:not(.active){color:var(--text)}

.panels{flex:1;overflow-y:auto;position:relative}
.panels::-webkit-scrollbar{width:4px}
.panels::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.panel{padding:20px;display:none;flex-direction:column;gap:14px;min-height:100%}
.panel.active{display:flex}

.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.card-title{font-size:11px;font-weight:500;margin-bottom:14px;display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.06em;color:var(--text2)}
.card-title i{font-size:16px;color:var(--accent)}
.night .card-title i{color:var(--gold)}

.lang-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.lang-row select{font-size:12px;padding:6px 10px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);outline:none}
.lang-row i{font-size:16px;color:var(--text3)}
.lang-hint{font-size:11.5px;color:var(--text3)}

/* QUICK PROMPTS — visible border in day mode */
.qp-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.qp{font-size:11.5px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s}
.qp:hover{border-color:var(--accent);color:var(--accent);background:var(--surface)}
.night .qp{background:var(--bg3);border-color:var(--border2);color:var(--text2)}
.night .qp:hover{border-color:var(--gold);color:var(--gold);background:var(--bg2)}

.messages{display:flex;flex-direction:column;gap:12px;min-height:220px;max-height:300px;overflow-y:auto;margin-bottom:12px}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.msg{display:flex;gap:8px;align-items:flex-start;max-width:90%;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.av{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.av.ai{background:var(--accent);color:#FFFFFF}
.night .av.ai{background:var(--gold);color:#1C1C1A}
.av.u{background:var(--bg3);color:var(--text2);border:0.5px solid var(--border2)}
.bubble{padding:9px 13px;border-radius:10px;font-size:13px;line-height:1.65}
.bubble.ai{background:var(--bg2);border:0.5px solid var(--border);border-top-left-radius:3px;color:var(--text)}
.bubble.user{background:var(--accent);color:#FFFFFF;border-top-right-radius:3px}
.night .bubble.user{background:var(--gold);color:#1C1C1A}
.bubble ul{margin:5px 0 0 14px;display:flex;flex-direction:column;gap:3px}
.bubble p{margin-bottom:3px}
.tdots{display:flex;gap:4px;align-items:center;padding:10px 13px}
.tdots span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:td 1.2s ease-in-out infinite}
.night .tdots span{background:var(--gold)}
.tdots span:nth-child(2){animation-delay:.2s}
.tdots span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.input-row{display:flex;gap:8px}
.input-row textarea{flex:1;border:0.5px solid var(--border2);border-radius:10px;padding:10px 13px;font-size:13px;resize:none;background:var(--bg2);color:var(--text);outline:none;min-height:42px;max-height:100px;line-height:1.5;transition:border-color .15s}
.input-row textarea:focus{border-color:var(--accent)}
.input-row textarea::placeholder{color:var(--text3)}

/* SEND BUTTON */
.send-btn{width:42px;height:42px;border-radius:10px;border:none;background:var(--accent);color:#FFFFFF;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.send-btn:hover{background:var(--accent2)}
.send-btn:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed}
.send-btn i{font-size:18px}
.night .send-btn{background:var(--gold);color:#1C1C1A}
.night .send-btn:hover{background:#B8943C}

.upload-zone{border:1px dashed var(--border2);border-radius:var(--radius-sm);padding:20px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:12px}
.upload-zone:hover{border-color:var(--accent);background:var(--bg2)}
.night .upload-zone:hover{border-color:var(--gold)}
.upload-zone input{display:none}
.upload-zone i{font-size:26px;color:var(--text3);display:block;margin-bottom:7px}
.upload-zone p{font-size:12.5px;color:var(--text2)}
.file-list{display:flex;flex-direction:column;gap:6px}
.file-item{display:flex;align-items:center;gap:8px;padding:7px 11px;background:var(--bg2);border-radius:7px;border:0.5px solid var(--border);font-size:12.5px}
.file-item i{color:var(--accent);font-size:15px}
.night .file-item i{color:var(--gold)}
.file-item span{flex:1;color:var(--text2)}
.file-del{background:none;border:none;cursor:pointer;color:var(--text3);padding:2px}
.file-del:hover{color:#A32D2D}

.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.photo-card{border-radius:var(--radius-sm);overflow:hidden;border:0.5px solid var(--border);cursor:pointer;transition:.15s}
.photo-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.night .photo-card:hover{border-color:var(--gold)}
.photo-card img{width:100%;height:90px;object-fit:cover;display:block;background:var(--bg2)}
.photo-label{font-size:11px;padding:6px 8px;color:var(--text2);background:var(--surface)}

.quiz-item{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px}
.quiz-q-text{font-size:13px;font-weight:500;margin-bottom:10px;color:var(--text)}
.quiz-opts{display:flex;flex-direction:column;gap:6px}
.quiz-opt{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text2);cursor:pointer}
.quiz-opt.correct{color:var(--accent);font-weight:500}
.night .quiz-opt.correct{color:var(--gold)}

/* ACTION BUTTONS — always visible */
.btn-sm{font-size:12px;padding:8px 16px;border-radius:7px;border:none;background:var(--accent);color:#FFFFFF;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background .15s}
.btn-sm:hover{background:var(--accent2)}
.night .btn-sm{background:var(--gold);color:#1C1C1A}
.night .btn-sm:hover{background:#B8943C}
.btn-outline{font-size:12px;padding:8px 16px;border-radius:7px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:var(--surface)}
.night .btn-outline:hover{border-color:var(--gold);color:var(--gold)}

.users-tbl{width:100%;font-size:12.5px;border-collapse:collapse}
.users-tbl th{text-align:left;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:7px 10px;border-bottom:0.5px solid var(--border)}
.users-tbl td{padding:9px 10px;border-bottom:0.5px solid var(--border);color:var(--text)}
.users-tbl tr:last-child td{border-bottom:none}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px}
.dot.active{background:#4A6741}
.night .dot.active{background:var(--gold)}
.dot.inactive{background:var(--border2)}
.tbl-act{font-size:11.5px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:500}
.night .tbl-act{color:var(--gold)}
.new-user-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-top:16px;padding-top:16px;border-top:0.5px solid var(--border)}
.new-user-row .field{margin-bottom:0;flex:1;min-width:110px}
.new-user-row .field label{font-size:10px}
.new-user-row .field input,.new-user-row .field select{font-size:12px;padding:8px 10px;background:var(--bg2);color:var(--text);border:0.5px solid var(--border2);border-radius:var(--radius-sm);width:100%;outline:none}

.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.metric{background:var(--bg2);border-radius:var(--radius-sm);padding:14px;border:0.5px solid var(--border)}
.metric-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.metric-val{font-size:24px;font-weight:500;color:var(--text)}

.modal-wrap{min-height:400px;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:20px;border-radius:var(--radius)}
.modal-box{background:var(--surface);border-radius:var(--radius);padding:22px;max-width:320px;width:100%;text-align:center;border:0.5px solid var(--border)}
.modal-box img{width:100%;border-radius:var(--radius-sm);margin-bottom:12px;object-fit:cover;height:180px}
.modal-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:5px}
.modal-desc{font-size:12px;color:var(--text2);line-height:1.6}
.modal-close{margin-top:14px;font-size:12px;padding:7px 18px;border-radius:7px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer}
.modal-close:hover{background:var(--bg3)}
</style>
</head>
<body>

<div id="authScreen">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-icon"><i class="ti ti-chef-hat"></i></div>
      <div>
        <div class="brand-name">Ops Companion</div>
        <div class="brand-sub">SmartHospitality.ai</div>
      </div>
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="lu" placeholder="Enter username" value="staff"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="lp" placeholder="Enter password" value="staff123" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="btn-main" onclick="login()">Sign in</button>
    <div id="lerr" class="err hidden">Incorrect username or password.</div>
    <div class="demo-hint">
      <strong>admin / admin123</strong> &nbsp;·&nbsp; <strong>manager / mgr123</strong> &nbsp;·&nbsp; <strong>staff / staff123</strong>
    </div>
  </div>
</div>

<div id="appShell">
  <div class="topbar">
    <div class="topbar-left">
      <div class="top-icon"><i class="ti ti-chef-hat"></i></div>
      <div>
        <div class="top-name">Ops Companion</div>
        <div class="top-outlet" id="outletLbl">SmartHospitality.ai</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="role-pill" id="rolePill">Staff</span>
      <button class="icon-btn" id="modeBtn" onclick="toggleMode()" aria-label="Toggle night mode"><i class="ti ti-moon" id="modeIcon"></i></button>
      <button class="icon-btn" onclick="logout()" aria-label="Sign out"><i class="ti ti-logout"></i></button>
    </div>
  </div>
  <div class="nav" id="nav"></div>
  <div class="panels" id="panels"></div>
</div>

<script>
const LANGS={en:'English',tr:'Türkçe',es:'Español',ar:'العربية',zh:'中文',ru:'Русский'};
const USERS=[
  {u:'admin',p:'admin123',role:'admin',name:'Gökhan H.',lang:'en'},
  {u:'manager',p:'mgr123',role:'manager',name:'Layla M.',lang:'en'},
  {u:'staff',p:'staff123',role:'staff',name:'Cem A.',lang:'en'},
  {u:'staff2',p:'staff456',role:'staff',name:'Maria S.',lang:'es'},
];
const SYS=`You are the AI operations assistant for a luxury restaurant on SmartHospitality.ai.
MENU: Truffle Risotto (arborio,truffle oil,parmesan,butter,onion,white wine — ALLERGENS: dairy,gluten — removable: onion — non-removable: parmesan). Wagyu Beef Tenderloin (wagyu,Béarnaise,potatoes,vegetables — ALLERGENS: eggs,dairy — removable: potatoes). Grilled Salmon (salmon,lemon butter,capers,dill,asparagus — ALLERGENS: fish,dairy — all removable). Caesar Salad (romaine,parmesan,croutons,dressing with anchovy+egg — ALLERGENS: fish,gluten,eggs,dairy — croutons removable). Lemon Tart (lemon curd,meringue,butter pastry — ALLERGENS: eggs,dairy,gluten — no modifications). Espresso Martini (vodka,espresso,coffee liqueur — no allergens, vegan).
UPSELLS: Risotto→Barolo or white Burgundy, truffle supplement. Wagyu→Château Pichon Baron or Negroni, truffle fries. Salmon→Chablis or Sauvignon Blanc. Caesar→add chicken or Pinot Grigio.
OUTLET: Open Tue–Sun 12:00–23:00. Closed Mon. Brunch Sat–Sun 12:00–15:00. Last food order 22:00, drinks 22:30. Live jazz Fri–Sat from 20:00. Smart casual. Reservations required for dinner.
SOPs: Guest complaint: listen, empathise, never argue, involve manager, offer goodwill with approval, log it. Allergen query: always verify with kitchen, never guess. Spillage: apologise, replace free, notify manager.
Be concise. Staff are on the floor. Respond in the specified language.`;

let cu=null,chat=[],loading=false,night=false;
let files={menu:[],sops:[],factsheet:[]};
let staff=[
  {u:'staff',name:'Cem A.',role:'staff',status:'active',lang:'en'},
  {u:'staff2',name:'Maria S.',role:'staff',status:'active',lang:'es'},
  {u:'staff3',name:'Ahmed K.',role:'staff',status:'inactive',lang:'ar'},
];
const PHOTOS=[
  {name:'Truffle Risotto',desc:'Shallow bowl, truffle shavings on top, micro herbs, drizzle of truffle oil. Parmesan crisp on the side.',img:'https://images.unsplash.com/photo-1476124369491-e7addf5db371?w=400&h=280&fit=crop'},
  {name:'Wagyu Tenderloin',desc:'Sliced at 45°, Béarnaise served separately, roasted vegetables fanned beside. Micro cress garnish.',img:'https://images.unsplash.com/photo-1544025162-d76694265947?w=400&h=280&fit=crop'},
  {name:'Espresso Martini',desc:'Coupe glass, three coffee beans centred on foam. Clean rim, no ice, coaster underneath.',img:'https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=400&h=280&fit=crop'},
  {name:'Lemon Tart',desc:'Torched Italian meringue, raspberry coulis streak across plate, single edible flower.',img:'https://images.unsplash.com/photo-1519915028121-7d3463d20b13?w=400&h=280&fit=crop'},
];
const QUIZZES=[{id:1,title:'Allergen awareness',questions:[
  {q:'Which dish contains anchovy?',opts:['Truffle Risotto','Caesar Salad','Grilled Salmon','Lemon Tart'],c:1},
  {q:'Can parmesan be removed from the Truffle Risotto?',opts:['Yes easily','No — integral to dish','Only with chef approval','Yes if requested ahead'],c:1},
  {q:'What allergens does the Lemon Tart contain?',opts:['Nuts and dairy','Gluten only','Eggs, dairy and gluten','Fish and eggs'],c:2},
],assigned:['staff','staff2']}];
let qresults={};

function toggleMode(){
  night=!night;
  document.body.classList.toggle('night',night);
  document.getElementById('modeIcon').className=night?'ti ti-sun':'ti ti-moon';
}

function login(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value.trim();
  const user=USERS.find(x=>x.u===u&&x.p===p);
  document.getElementById('lerr').classList.toggle('hidden',!!user);
  if(!user)return;
  cu={...user};
  document.getElementById('authScreen').style.display='none';
  const shell=document.getElementById('appShell');
  shell.style.display='flex';shell.style.flexDirection='column';
  const rp=document.getElementById('rolePill');
  rp.textContent=cu.role.charAt(0).toUpperCase()+cu.role.slice(1);
  rp.className='role-pill '+cu.role;
  document.getElementById('outletLbl').textContent='Gallada — Peninsula Istanbul';
  buildApp();
}

function logout(){
  cu=null;chat=[];
  document.getElementById('appShell').style.display='none';
  document.getElementById('authScreen').style.display='flex';
}

function buildApp(){
  const r=cu.role;
  const tabs=r==='admin'
    ?[{id:'users',icon:'ti-users',label:'Users'},{id:'metrics',icon:'ti-chart-bar',label:'Overview'}]
    :r==='manager'
    ?[{id:'chat',icon:'ti-message-circle',label:'Assistant'},{id:'knowledge',icon:'ti-database',label:'Knowledge'},{id:'photos',icon:'ti-photo',label:'Photos'},{id:'quizzes',icon:'ti-school',label:'Quizzes'},{id:'staff',icon:'ti-users',label:'Staff'}]
    :[{id:'chat',icon:'ti-message-circle',label:'Ask AI'},{id:'photos',icon:'ti-photo',label:'Photos'},{id:'quizzes',icon:'ti-school',label:'My Quizzes'}];
  const nav=document.getElementById('nav');
  const panels=document.getElementById('panels');
  nav.innerHTML='';panels.innerHTML='';
  tabs.forEach((t,i)=>{
    const b=document.createElement('button');
    b.className='nav-btn'+(i===0?' active':'');
    b.dataset.tab=t.id;
    b.innerHTML=`<i class="ti ${t.icon}"></i>${t.label}`;
    b.onclick=()=>switchTab(t.id);
    nav.appendChild(b);
    const p=document.createElement('div');
    p.className='panel'+(i===0?' active':'');
    p.id='p-'+t.id;
    panels.appendChild(p);
    renderPanel(t.id);
  });
  if(cu.role!=='admin') initGreeting();
}

function switchTab(id){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='p-'+id));
}

function renderPanel(id){
  const el=document.getElementById('p-'+id);
  if(!el)return;
  const r=cu.role;
  if(id==='chat')el.innerHTML=buildChat(r);
  else if(id==='knowledge')el.innerHTML=buildKnowledge();
  else if(id==='photos')el.innerHTML=buildPhotos(r);
  else if(id==='quizzes')el.innerHTML=buildQuizzes(r);
  else if(id==='staff'||id==='users')el.innerHTML=buildUsers(r);
  else if(id==='metrics')el.innerHTML=buildMetrics();
}

function buildChat(r){
  const isStaff=r==='staff';
  const qps=isStaff
    ?['Allergens in the Caesar salad?','Can I remove onion from the risotto?','Best pairing for the wagyu?','Open for brunch Sunday?','Last order time tonight?']
    :['Upsell opportunities tonight?','Guest complaint SOP?','Which dishes are vegan?','Entertainment schedule?'];
  return`<div class="card" style="flex:1;display:flex;flex-direction:column">
  <div class="lang-row">
    <i class="ti ti-language"></i>
    <select id="langSel" onchange="cu.lang=this.value">
      ${Object.entries(LANGS).map(([k,v])=>`<option value="${k}"${k===cu.lang?' selected':''}>${v}</option>`).join('')}
    </select>
    <span class="lang-hint">AI responds in your language</span>
  </div>
  <div class="qp-row">${qps.map(q=>`<button class="qp" onclick="useQP(this)">${q}</button>`).join('')}</div>
  <div class="messages" id="msgs" style="flex:1"></div>
  <div class="input-row">
    <textarea id="chatIn" placeholder="Ask about menu, allergens, SOPs, hours…" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendChat()"><i class="ti ti-send-2"></i></button>
  </div>
</div>`;
}

function buildKnowledge(){
  return[
    {k:'menu',icon:'ti-file-text',label:'Food bible',hint:'Ingredients, allergens, and modifiable items'},
    {k:'sops',icon:'ti-clipboard-list',label:'SOPs',hint:'Service standards and procedures'},
    {k:'factsheet',icon:'ti-info-circle',label:'Outlet fact sheet',hint:'Hours, entertainment, policies'},
  ].map(c=>`<div class="card">
    <div class="card-title"><i class="ti ${c.icon}"></i>${c.label}</div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:12px">${c.hint}</p>
    <label class="upload-zone" for="up-${c.k}">
      <input type="file" id="up-${c.k}" multiple accept=".pdf,.txt,.docx" onchange="addFile('${c.k}',this)">
      <i class="ti ti-upload"></i>
      <p>Click to upload &nbsp;·&nbsp; PDF, DOCX or TXT</p>
    </label>
    <div class="file-list" id="fl-${c.k}">
      ${(files[c.k]||[]).map((f,i)=>`<div class="file-item"><i class="ti ti-file"></i><span>${f}</span><button class="file-del" onclick="rmFile('${c.k}',${i})"><i class="ti ti-trash"></i></button></div>`).join('')}
    </div>
  </div>`).join('');
}

function buildPhotos(r){
  const canUp=r!=='staff';
  return`<div class="card">
  <div class="card-title"><i class="ti ti-photo"></i>Dish presentations</div>
  ${canUp?`<label class="upload-zone" for="up-photos" style="margin-bottom:14px">
    <input type="file" id="up-photos" multiple accept="image/*" onchange="addPhoto(this)">
    <i class="ti ti-camera-plus"></i><p>Upload presentation photos</p></label>`:''}
  <div class="photo-grid">
    ${PHOTOS.map((p,i)=>`<div class="photo-card" onclick="openPhoto(${i})">
      <img src="${p.img}" alt="${p.name}" loading="lazy"/>
      <div class="photo-label">${p.name}</div>
    </div>`).join('')}
  </div>
</div>`;
}

function buildQuizzes(r){
  if(r==='staff'){
    const mine=QUIZZES.filter(q=>q.assigned.includes(cu.u));
    if(!mine.length)return`<div class="card"><p style="font-size:13px;color:var(--text2)">No quizzes assigned yet.</p></div>`;
    return mine.map(q=>{
      const res=qresults[cu.u]&&qresults[cu.u][q.id];
      return`<div class="card">
      <div class="card-title"><i class="ti ti-school"></i>${q.title}</div>
      ${res?`<p style="font-size:13px;color:var(--accent);margin-bottom:12px">Completed: ${res.score}/${res.total} correct</p>`:''}
      <div id="qz-${q.id}">
        ${q.questions.map((qq,qi)=>`<div class="quiz-item">
          <div class="quiz-q-text">Q${qi+1}. ${qq.q}</div>
          <div class="quiz-opts">${qq.opts.map((o,oi)=>`<label class="quiz-opt"><input type="radio" name="q${q.id}-${qi}" value="${oi}" style="accent-color:var(--accent)"> ${o}</label>`).join('')}</div>
        </div>`).join('')}
        <button class="btn-sm" onclick="submitQuiz(${q.id})"><i class="ti ti-send" style="font-size:13px"></i> Submit</button>
      </div>
    </div>`;}).join('');
  }
  return`<div class="card">
  <div class="card-title"><i class="ti ti-school"></i>Staff quizzes</div>
  ${QUIZZES.map(q=>`<div style="border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:13px;font-weight:500">${q.title}</span>
      <span style="font-size:11px;color:var(--text3)">${q.questions.length} questions</span>
    </div>
    ${q.questions.map((qq,qi)=>`<div class="quiz-item"><div class="quiz-q-text">Q${qi+1}. ${qq.q}</div>
      <div class="quiz-opts">${qq.opts.map((o,oi)=>`<div class="quiz-opt${oi===qq.c?' correct':''}"><i class="ti ${oi===qq.c?'ti-circle-check':'ti-circle'}" style="font-size:13px"></i> ${o}</div>`).join('')}</div>
    </div>`).join('')}
  </div>`).join('')}
  <button class="btn-outline" onclick="alert('Quiz builder available in the full production version.')"><i class="ti ti-plus"></i> Create quiz</button>
</div>`;
}

function buildUsers(r){
  const isAdmin=r==='admin';
  return`<div class="card">
  <div class="card-title"><i class="ti ti-users"></i>${isAdmin?'All users':'Staff accounts'}</div>
  <table class="users-tbl">
    <thead><tr><th>Name</th><th>Username</th><th>Language</th><th>Status</th>${!isAdmin?'<th></th>':''}</tr></thead>
    <tbody>
      ${staff.map((u,i)=>`<tr>
        <td>${u.name}</td>
        <td style="color:var(--text2)">${u.u}</td>
        <td style="color:var(--text2)">${LANGS[u.lang]||u.lang}</td>
        <td><span class="dot ${u.status}"></span>${u.status}</td>
        ${!isAdmin?`<td><button class="tbl-act" onclick="toggleSt(${i})">${u.status==='active'?'Deactivate':'Activate'}</button></td>`:''}
      </tr>`).join('')}
    </tbody>
  </table>
  ${r==='manager'?`<div class="new-user-row">
    <div class="field"><label>Full name</label><input type="text" id="nName" placeholder="e.g. Sarah T."/></div>
    <div class="field"><label>Username</label><input type="text" id="nUser" placeholder="username"/></div>
    <div class="field"><label>Password</label><input type="password" id="nPass" placeholder="password"/></div>
    <div class="field"><label>Language</label><select id="nLang" style="background:var(--bg2);color:var(--text);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:8px 10px;width:100%;outline:none">${Object.entries(LANGS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select></div>
    <button class="btn-sm" onclick="addUser()" style="margin-bottom:0;white-space:nowrap"><i class="ti ti-user-plus" style="font-size:13px"></i> Add</button>
  </div>`:''}
</div>`;
}

function buildMetrics(){
  return`<div class="metric-grid">
  <div class="metric"><div class="metric-label">Active staff</div><div class="metric-val">3</div></div>
  <div class="metric"><div class="metric-label">Quizzes live</div><div class="metric-val">1</div></div>
  <div class="metric"><div class="metric-label">Documents</div><div class="metric-val">0</div></div>
  <div class="metric"><div class="metric-label">AI queries today</div><div class="metric-val">—</div></div>
</div>
<div class="card" style="margin-top:0">
  <div class="card-title"><i class="ti ti-info-circle"></i>Platform overview</div>
  <p style="font-size:13px;color:var(--text2);line-height:1.7">Full analytics including daily query counts, quiz completion rates, and most-asked questions are available in the production version.</p>
</div>`;
}

function initGreeting(){
  setTimeout(()=>{
    const msgs=document.getElementById('msgs');
    if(!msgs||chat.length)return;
    const g={en:'Hello. Ask me anything about the menu, allergens, presentations, SOPs, or outlet information.',tr:'Merhaba. Menü, alerjenler, sunum veya restoran bilgileri hakkında her şeyi sorabilirsiniz.',es:'Hola. Pregúntame sobre el menú, alérgenos, presentaciones o información del restaurante.',ar:'مرحباً. اسألني عن القائمة أو مسببات الحساسية أو إجراءات الخدمة.',zh:'你好。请随时询问菜单、过敏原、摆盘或餐厅信息。',ru:'Привет. Спрашивайте о меню, аллергенах, подаче блюд или информации о ресторане.'};
    addAI(g[cu.lang]||g.en);
  },80);
}

function useQP(btn){const i=document.getElementById('chatIn');if(i){i.value=btn.textContent;i.dispatchEvent(new Event('input'));}sendChat();}

function addAI(html){
  const msgs=document.getElementById('msgs');if(!msgs)return;
  const w=document.createElement('div');w.className='msg';
  const av=document.createElement('div');av.className='av ai';av.textContent='AI';
  const b=document.createElement('div');b.className='bubble ai';b.innerHTML=html;
  w.appendChild(av);w.appendChild(b);msgs.appendChild(w);msgs.scrollTop=msgs.scrollHeight;
}
function addUser2(text){
  const msgs=document.getElementById('msgs');if(!msgs)return;
  const w=document.createElement('div');w.className='msg user';
  const av=document.createElement('div');av.className='av u';av.textContent='Me';
  const b=document.createElement('div');b.className='bubble user';b.textContent=text;
  w.appendChild(av);w.appendChild(b);msgs.appendChild(w);msgs.scrollTop=msgs.scrollHeight;
}
function showTyping(){
  const msgs=document.getElementById('msgs');if(!msgs)return;
  const w=document.createElement('div');w.className='msg';w.id='ty';
  const av=document.createElement('div');av.className='av ai';av.textContent='AI';
  const b=document.createElement('div');b.className='bubble ai';
  b.innerHTML='<div class="tdots"><span></span><span></span><span></span></div>';
  w.appendChild(av);w.appendChild(b);msgs.appendChild(w);msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){const el=document.getElementById('ty');if(el)el.remove();}

function fmt(t){
  let h=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>');
  const lines=h.split('\n');let out='';let ul=false;
  for(const l of lines){const s=l.trim();
    if(s.startsWith('- ')||s.startsWith('• ')){if(!ul){out+='<ul>';ul=true;}out+=`<li>${s.slice(2)}</li>`;}
    else if(/^\d+\.\s/.test(s)){if(!ul){out+='<ul>';ul=true;}out+=`<li>${s.replace(/^\d+\.\s/,'')}</li>`;}
    else{if(ul){out+='</ul>';ul=false;}if(s)out+=`<p>${s}</p>`;}
  }if(ul)out+='</ul>';return out;
}

async function sendChat(){
  if(loading)return;
  const inp=document.getElementById('chatIn');
  const text=inp?.value.trim();if(!text)return;
  loading=true;document.getElementById('sendBtn').disabled=true;
  inp.value='';inp.style.height='auto';
  addUser2(text);chat.push({role:'user',content:text});
  showTyping();
  const lang=LANGS[cu.lang]||'English';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:SYS+`\n\nRespond in ${lang}. Be concise.`,messages:chat})
    });
    const data=await res.json();hideTyping();
    if(data.content&&data.content[0]){
      const reply=data.content[0].text;
      chat.push({role:'assistant',content:reply});addAI(fmt(reply));
    } else addAI('Something went wrong. Please try again.');
  }catch(e){hideTyping();addAI('Connection error. Please try again.');}
  loading=false;document.getElementById('sendBtn').disabled=false;
  document.getElementById('chatIn')?.focus();
}

function addFile(k,inp){Array.from(inp.files).forEach(f=>{if(!files[k])files[k]=[];files[k].push(f.name);});refreshFiles(k);}
function refreshFiles(k){const el=document.getElementById('fl-'+k);if(!el)return;el.innerHTML=files[k].map((f,i)=>`<div class="file-item"><i class="ti ti-file"></i><span>${f}</span><button class="file-del" onclick="rmFile('${k}',${i})"><i class="ti ti-trash"></i></button></div>`).join('');}
function rmFile(k,i){files[k].splice(i,1);refreshFiles(k);}
function addPhoto(inp){Array.from(inp.files).forEach(f=>{PHOTOS.push({name:f.name.replace(/\.[^.]+$/,''),desc:'Uploaded presentation.',img:URL.createObjectURL(f)});});renderPanel('photos');}

function openPhoto(i){
  const p=PHOTOS[i];
  const panels=document.getElementById('panels');
  const old=document.getElementById('photoModal');if(old)old.remove();
  const m=document.createElement('div');m.id='photoModal';m.style.cssText='position:absolute;top:0;left:0;right:0;bottom:0;z-index:99';
  m.innerHTML=`<div class="modal-wrap" onclick="if(event.target===this.parentElement||event.target.classList.contains('modal-wrap'))closePhoto()">
    <div class="modal-box">
      <img src="${p.img}" alt="${p.name}"/>
      <div class="modal-title">${p.name}</div>
      <div class="modal-desc">${p.desc}</div>
      <button class="modal-close" onclick="closePhoto()">Close</button>
    </div>
  </div>`;
  panels.style.position='relative';panels.appendChild(m);
}
function closePhoto(){const m=document.getElementById('photoModal');if(m)m.remove();}

function submitQuiz(qid){
  const quiz=QUIZZES.find(q=>q.id===qid);if(!quiz)return;
  let score=0;
  quiz.questions.forEach((qq,qi)=>{const sel=document.querySelector(`input[name="q${qid}-${qi}"]:checked`);if(sel&&parseInt(sel.value)===qq.c)score++;});
  if(!qresults[cu.u])qresults[cu.u]={};
  qresults[cu.u][qid]={score,total:quiz.questions.length};
  alert(`Submitted. You scored ${score} out of ${quiz.questions.length}.`);
  renderPanel('quizzes');
}
function toggleSt(i){staff[i].status=staff[i].status==='active'?'inactive':'active';renderPanel('staff');}
function addUser(){
  const n=document.getElementById('nName').value.trim();
  const u=document.getElementById('nUser').value.trim();
  const p=document.getElementById('nPass').value.trim();
  const l=document.getElementById('nLang').value;
  if(!n||!u||!p){alert('Please fill all fields.');return;}
  staff.push({u,name:n,role:'staff',status:'active',lang:l});
  USERS.push({u,p,role:'staff',name:n,lang:l});
  renderPanel('staff');
}
</script>
</body>
